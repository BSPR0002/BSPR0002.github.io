<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="/css/resource_library.css">
		<script src="/javascript/Library.js"></script>
	</head>
	<body>
		<div id="library_box_frame" class="no-pagination">
			<div id="library_search_bar">
				<div id="library_search_bar_magnifier"></div>
				<button id="library_search_bar_search">搜索</button>
				<input id="library_search_bar_input" type="search" placeholder="请输入搜索关键字">
			</div>
			<div id="library_pagination"><div id="library_pagination_frame"><button class="library_pagination_button" id="library_pagination_previous">上一页</button><span id="library_pagination_display">第 <input id="library_pagination_input" type="number" min="1" step="1" max="1" value="1"> 页，共 <span id="library_pagination_total"></span> 页</span><button class="library_pagination_button" id="library_pagination_next">下一页</button></div></div>
			<div id="library_show_box"></div>
		</div>
	</body>
</html>
