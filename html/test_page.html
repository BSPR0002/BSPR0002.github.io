<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>脚本测试场</title>
		<link rel="stylesheet" type="text/css" href="/css/BSIF_style.css">
		<link rel="stylesheet" type="text/css" href="/css/resource_library.css">
		<script src="/javascript/BSFL.js"></script>
		<script src="/javascript/Functions.js"></script>
		<script src="/javascript/Library.js"></script>
		<script src="/javascript/TestFunction.js"></script>
		<script src="/javascript/marked.js"></script>
	</head>
	<body style="background-color:#92C1DC;color:#000000;">
		<p>
			这里是测试用的网页……<br>
			不要盯着看了啦！很羞羞哒！<br>
			///﹏///
		</p><br>
		<button onclick="javascript:testfunc();">测试</button>
		<input type="file">
		<div id="targetdiv">目标对象</div>
		<div class="exp"></div>
		<div id="show_box">
		</div>
		<div id="window_board_layer">
			<style type="text/css">
				#window_board_layer {
					position:fixed;
					top:0;
					left:0;
					width:100%;
					height:100%;
					z-index:100;
					background-color:rgba(0,0,0,0.7);
					opacity:0;
					display:none;
					transition:opacity 0.5s ease-in-out;
				}
				#window_board {
					margin:auto;
					display:flex;
					flex-direction:column;
					min-width:256px;
					min-height:128px;
					max-width:80%;
					max-height:80%;
					background-color:#FFFFFF;
					border-radius:10px;
					overflow:hidden;
					padding:10px;
					font-size:15px;
				}
				#window_board hr{width:100%}
				#window_board_top {
					height:20px;
					position:relative;
					flex-shrink:0;
				}
				#window_board_content {
					word-wrap:break-word;
					word-break:normal;
					overflow:auto;
				}
				#window_board_title {
					position:absolute;
					top:0;
					bottom:0;
					left:0;
					right:20px;
					margin:0;
					white-space:nowrap;
					overflow:hidden;
					text-overflow:ellipsis;
				}
				#window_board_close{
					display:block;
					background-color:transparent;
					position:absolute;
					width:20px;
					height:20px;
					border:none;
					right:0;
					top:0;
				}
				#window_board_close:before,#window_board_close:after {
					position:absolute;
					display:block;
					top:0;
					right:9px;
					width:2px;
					height:20px;
					content:"";
					border-style:solid;
					border-width:1px;
					box-sizing:border-box;
					border-color:#000000;
					transform:rotate(45deg);
				}
				#window_board_close:after {
					transform:rotate(135deg);
				}
			</style>
			<div id="window_board">
				<div id="window_board_top">
					<p id="window_board_title"></p>
					<button id="window_board_close" onclick="javascript:window_board.hide()"></button>
				</div>
				<hr>
				<div id="window_board_content"></div>
			</div>
		</div>
	</body>
</html>
