<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>脚本测试场</title>
		<link rel="stylesheet" type="text/css" href="/css/BSIF_style.css">
		<link rel="stylesheet" type="text/css" href="/css/test_page.css">
		<script src="/javascript/BSFL.js"></script>
		<script src="/javascript/LocalDebug.js"></script>
		<script src="/javascript/TestFunction.js"></script>
	</head>
	<body>
		<div id="tools_plate" class="off">
			<button id="tools_plate_switch">
				<script>
					document.getElementById("tools_plate_switch").addEventListener("click",(function(){
						var state=false;
						return function(){
							state=!state;
							if (state) {this.parentNode.className="on"} else {this.parentNode.className="off"};
						}
					})())
				</script>
				<div id="tools_plate_switch_icon"></div>
			</button>
			<div id="tool_select_files" class="test_tools">
				选择文件
				<form name="tool_select_files_mode" id="tool_select_files_mode">
					<script>document.forms.tool_select_files_mode.addEventListener("change",function(){document.getElementById("tool_select_files_select").multiple=Boolean(parseInt(this.elements.multiple.value))})</script>
					<span><input type="radio" name="multiple" value="0" checked>单选</span>
					<span><input type="radio" name="multiple" value="1">多选</span>
				</form>
				<input type="file" id="tool_select_files_select">
			</div>
			<hr style="margin:0 auto">
		</div>
	</body>
</html>
